# golangci-lint configuration for the h3-explorer-ui backend (schema v2).
# Run with: golangci-lint run ./...
version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - misspell
    - unconvert
    - unparam
    - bodyclose
    - gocritic
    - gosec
    - nilerr
    - errorlint
  settings:
    revive:
      rules:
        - name: exported
    gosec:
      excludes:
        - G104 # handled explicitly where we intentionally ignore write errors
  exclusions:
    rules:
      # Test files may use less strict patterns.
      - path: _test\.go
        linters:
          - gosec
          - unparam

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/JesusCabreraReveles/h3-explorer-ui/backend

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
