# golangci-lint configuration for the h3-explorer-ui backend.
# Run with: golangci-lint run ./...
run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - revive
    - misspell
    - unconvert
    - unparam
    - bodyclose
    - gocritic
    - gosec
    - nilerr
    - errorlint

linters-settings:
  goimports:
    local-prefixes: github.com/JesusCabreraReveles/h3-explorer-ui/backend
  revive:
    rules:
      - name: exported
        disabled: false
  gosec:
    excludes:
      - G104 # handled explicitly where we intentionally ignore write errors

issues:
  exclude-rules:
    # Test files may use less strict patterns.
    - path: _test\.go
      linters:
        - gosec
        - unparam
  max-issues-per-linter: 0
  max-same-issues: 0
